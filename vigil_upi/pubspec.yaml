name: vigil_upi
description: VigilUPI — Behavioral Soulprint™ fraud detection for UPI payments.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Payment Gateway — launches native UPI apps via Android intent
  upi_india: ^3.0.1

  # On-Device AI — runs TFLite model for Soulprint inference without network
  tflite_flutter: ^0.10.4

  # Encrypted local vault — stores Golden Profile (baseline behavioral vector)
  hive_flutter: ^1.1.0

  # Sensor access — accelerometer + gyroscope for motion dynamics
  sensors_plus: ^6.0.0

  # State management — propagates SoulprintState across widget tree
  provider: ^6.1.2

  # Context risk signals — network type, phone call state, location
  connectivity_plus: ^6.0.3
  phone_state: ^2.1.0
  geolocator: ^13.0.2

  # Face liveness for high-value transaction confirmation (on-device ML)
  google_mlkit_face_detection: ^0.11.0
  camera: ^0.11.0+2

  # Aesthetics
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  dynamic_color: ^1.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/models/soulprint_model.tflite
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 26
